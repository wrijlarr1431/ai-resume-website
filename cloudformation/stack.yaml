AWSTemplateFormatVersion: "2010-09-09"
Description: AI Resume Website Infrastructure

Parameters:
  BucketName:
    Type: String
    Description: S3 bucket name for resume hosting

Resources:

  ResumeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  ResumeBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ResumeBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"

  DeploymentTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DeploymentTracking
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deploymentId
          AttributeType: S
      KeySchema:
        - AttributeName: deploymentId
          KeyType: HASH

  ResumeAnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ResumeAnalytics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: analysisId
          AttributeType: S
      KeySchema:
        - AttributeName: analysisId
          KeyType: HASH

Outputs:
  BetaURL:
    Value: !Sub "http://${BucketName}.s3-website-${AWS::Region}.amazonaws.com/beta/index.html"
  ProdURL:
    Value: !Sub "http://${BucketName}.s3-website-${AWS::Region}.amazonaws.com/prod/index.html"